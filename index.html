<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy's Road to Anthropic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-soft: #4a7c59;
    --green-mist: #a8c5a0;
    --green-pale: #d4e8cc;
    --green-fog: #eef5eb;
    --cream: #faf7f0;
    --petal-white: #fff9f0;
    --daisy-yellow: #f5c842;
    --daisy-gold: #e8a800;
    --blush: #f2d4c8;
    --sage: #8fa882;
    --bark: #6b4f3a;
    --text-dark: #1a2e1e;
    --text-mid: #3d5c42;
    --text-muted: #7a9478;
    --border: rgba(74, 124, 89, 0.18);
    --shadow: rgba(26, 58, 42, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(ellipse at 10% 20%, rgba(168,197,160,0.15) 0%, transparent 50%), radial-gradient(ellipse at 90% 80%, rgba(212,232,204,0.2) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .page-wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  .leaf-deco { position: fixed; pointer-events: none; opacity: 0.07; z-index: 0; }
  .leaf-deco.tl { top: -20px; left: -30px; transform: rotate(25deg); }
  .leaf-deco.br { bottom: 60px; right: -40px; transform: rotate(-20deg) scaleX(-1); }

  .hero { text-align: center; padding: 3.5rem 0 2.5rem; position: relative; }
  .hero-deco { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.25rem; animation: fadeUp 0.8s ease both; }
  .petal-ring { width: 64px; height: 64px; }
  .petal-ring .petals { animation: spin-slow 20s linear infinite; transform-origin: center; }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,5vw,3rem); font-weight: 600; color: var(--green-deep); line-height: 1.15; margin-bottom: 0.5rem; animation: fadeUp 0.8s 0.1s ease both; }
  .hero h1 em { font-style: italic; color: var(--green-soft); }
  .hero-sub { font-size: 14px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 300; margin-bottom: 1.5rem; animation: fadeUp 0.8s 0.2s ease both; }
  .hero-tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; color: var(--text-mid); max-width: 400px; margin: 0 auto 2rem; line-height: 1.7; animation: fadeUp 0.8s 0.3s ease both; }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 2rem; animation: fadeUp 0.8s 0.4s ease both; }
  @media (max-width: 520px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--petal-white); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; text-align: center; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow); }
  .stat-card::before { content: ''; position: absolute; bottom: -8px; right: -8px; width: 40px; height: 40px; background: var(--green-fog); border-radius: 50%; opacity: 0.6; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--green-deep); font-weight: 600; }

  .overall-progress { background: var(--petal-white); border: 1px solid var(--border); border-radius: 20px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; animation: fadeUp 0.8s 0.5s ease both; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label span:first-child { font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 500; }
  .progress-label span:last-child { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--green-soft); }
  .prog-track { height: 8px; background: var(--green-fog); border-radius: 99px; overflow: hidden; position: relative; }
  .prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green-soft), var(--green-mist)); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); position: relative; }
  .prog-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; background: var(--daisy-yellow); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 0 3px rgba(245,200,66,0.3); }

  .phase-card { background: var(--petal-white); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 1rem; overflow: hidden; transition: box-shadow 0.2s; animation: fadeUp 0.7s ease both; }
  .phase-card:hover { box-shadow: 0 6px 20px var(--shadow); }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 1.1rem 1.5rem; cursor: pointer; user-select: none; }
  .phase-header:hover { background: var(--green-fog); }
  .phase-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .phase-meta { flex: 1; min-width: 0; }
  .phase-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 2px; }
  .phase-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--green-deep); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .phase-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .phase-count { font-size: 12px; color: var(--text-muted); }
  .phase-mini-bar { width: 60px; height: 4px; background: var(--green-fog); border-radius: 99px; overflow: hidden; }
  .phase-mini-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .chevron { font-size: 14px; color: var(--text-muted); transition: transform 0.25s; }
  .phase-body { border-top: 1px solid var(--border); padding: 1.25rem 1.5rem 1.5rem; display: none; }
  .phase-body.open { display: block; }

  .section-head { display: flex; align-items: center; gap: 8px; margin: 1.25rem 0 0.6rem; }
  .section-head:first-child { margin-top: 0; }
  .section-head span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; }
  .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 10px; transition: background 0.15s; }
  .check-item:hover { background: var(--green-fog); }
  .check-item input[type=checkbox] { appearance: none; width: 17px; height: 17px; border: 1.5px solid var(--green-mist); border-radius: 5px; margin-top: 2px; flex-shrink: 0; cursor: pointer; position: relative; transition: all 0.2s; background: white; }
  .check-item input[type=checkbox]:checked { background: var(--green-soft); border-color: var(--green-soft); }
  .check-item input[type=checkbox]:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
  .check-text { flex: 1; cursor: pointer; }
  .check-main { font-size: 13px; color: var(--text-dark); line-height: 1.5; font-weight: 400; transition: color 0.2s; }
  .check-main.done { color: var(--text-muted); text-decoration: line-through; }
  .check-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; line-height: 1.5; }
  .open-panel-btn { margin-left: auto; flex-shrink: 0; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 3px 9px; font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .open-panel-btn:hover { background: var(--green-fog); color: var(--green-soft); border-color: var(--green-soft); }

  .task-progress { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .task-prog-bar { flex: 1; height: 3px; background: var(--green-fog); border-radius: 99px; overflow: hidden; max-width: 60px; }
  .task-prog-fill { height: 100%; border-radius: 99px; background: var(--green-soft); transition: width 0.4s; }
  .task-prog-label { font-size: 10px; color: var(--text-muted); }

  .notes-wrap { margin-top: 1.25rem; }
  .notes-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
  textarea.notes { width: 100%; min-height: 72px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--green-fog); color: var(--text-dark); font-family: 'DM Sans', sans-serif; font-size: 13px; resize: vertical; transition: border-color 0.2s, box-shadow 0.2s; outline: none; line-height: 1.6; }
  textarea.notes:focus { border-color: var(--green-soft); box-shadow: 0 0 0 3px rgba(74,124,89,0.1); }
  .notes-footer { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .save-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--green-soft); color: var(--green-soft); background: transparent; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .save-btn:hover { background: var(--green-soft); color: white; }
  .saved-hint { font-size: 11px; color: var(--green-soft); opacity: 0; transition: opacity 0.3s; }

  .footer { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
  .footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--text-muted); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .phase-card:nth-child(1) { animation-delay: 0.1s; }
  .phase-card:nth-child(2) { animation-delay: 0.2s; }
  .phase-card:nth-child(3) { animation-delay: 0.3s; }
  .phase-card:nth-child(4) { animation-delay: 0.4s; }

  /* ── PANEL OVERLAY ── */
  .overlay { position: fixed; inset: 0; background: rgba(26,46,30,0.45); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.active { opacity: 1; pointer-events: all; }

  .side-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(480px, 100vw); background: var(--cream); z-index: 101; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; display: flex; flex-direction: column; }
  .side-panel.active { transform: translateX(0); }

  .panel-header { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--cream); z-index: 2; }
  .panel-close { position: absolute; top: 1.25rem; right: 1.25rem; background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .panel-close:hover { background: var(--green-fog); color: var(--green-deep); }
  .panel-phase-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 6px; }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green-deep); line-height: 1.3; margin-bottom: 4px; padding-right: 2rem; }
  .panel-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; }

  .panel-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .panel-prog-track { flex: 1; height: 6px; background: var(--green-fog); border-radius: 99px; overflow: hidden; }
  .panel-prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green-soft), var(--green-mist)); transition: width 0.4s; }
  .panel-prog-label { font-size: 12px; color: var(--green-soft); font-weight: 500; white-space: nowrap; }

  .panel-body { padding: 1.25rem 1.5rem 2rem; flex: 1; }
  .panel-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; margin: 1.5rem 0 0.75rem; display: flex; align-items: center; gap: 8px; }
  .panel-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .panel-section-label:first-child { margin-top: 0; }

  .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 12px; transition: background 0.15s; margin-bottom: 4px; }
  .step-item:hover { background: var(--green-fog); }
  .step-item input[type=checkbox] { appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--green-mist); border-radius: 6px; margin-top: 1px; flex-shrink: 0; cursor: pointer; position: relative; transition: all 0.2s; background: white; }
  .step-item input[type=checkbox]:checked { background: var(--green-soft); border-color: var(--green-soft); }
  .step-item input[type=checkbox]:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
  .step-text { flex: 1; }
  .step-main { font-size: 13px; color: var(--text-dark); line-height: 1.55; font-weight: 400; }
  .step-main.done { color: var(--text-muted); text-decoration: line-through; }
  .step-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }

  .panel-resource { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 6px; font-size: 12px; color: var(--text-mid); background: var(--petal-white); text-decoration: none; transition: all 0.15s; }
  .panel-resource:hover { background: var(--green-fog); border-color: var(--green-soft); color: var(--green-deep); }
  .panel-resource span { font-size: 14px; }

  .panel-main-check { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--green-fog); border-radius: 12px; margin-top: 1.5rem; cursor: pointer; border: 1px solid var(--border); transition: background 0.15s; }
  .panel-main-check:hover { background: var(--green-pale); }
  .panel-main-check input[type=checkbox] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--green-mist); border-radius: 6px; flex-shrink: 0; cursor: pointer; position: relative; transition: all 0.2s; background: white; }
  .panel-main-check input[type=checkbox]:checked { background: var(--green-soft); border-color: var(--green-soft); }
  .panel-main-check input[type=checkbox]:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
  .panel-main-check-label { font-size: 13px; font-weight: 500; color: var(--green-deep); }
</style>
</head>
<body>

<svg class="leaf-deco tl" width="220" height="220" viewBox="0 0 220 220">
  <path d="M20 200 Q60 40 200 20 Q180 100 120 140 Q80 165 20 200Z" fill="#2d5a3d"/>
  <path d="M20 200 Q110 110 200 20" stroke="#2d5a3d" stroke-width="2" fill="none"/>
</svg>
<svg class="leaf-deco br" width="280" height="280" viewBox="0 0 280 280">
  <path d="M20 260 Q80 40 260 20 Q230 120 155 170 Q100 205 20 260Z" fill="#2d5a3d"/>
</svg>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-phase-badge" id="panel-phase-badge"></div>
    <div class="panel-title" id="panel-title"></div>
    <div class="panel-desc" id="panel-desc"></div>
    <div class="panel-progress-row">
      <div class="panel-prog-track"><div class="panel-prog-fill" id="panel-prog-fill" style="width:0%"></div></div>
      <span class="panel-prog-label" id="panel-prog-label">0 / 0 steps</span>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div class="page-wrap">
  <header class="hero">
    <div class="hero-deco">
      <svg class="petal-ring" viewBox="0 0 64 64">
        <g class="petals" transform-origin="32 32">
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.9"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.9" transform="rotate(45 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.9" transform="rotate(90 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.9" transform="rotate(135 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.85" transform="rotate(180 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.85" transform="rotate(225 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.85" transform="rotate(270 32 32)"/>
          <ellipse cx="32" cy="12" rx="5" ry="10" fill="#f5c842" opacity="0.85" transform="rotate(315 32 32)"/>
        </g>
        <circle cx="32" cy="32" r="8" fill="#e8a800"/>
        <circle cx="32" cy="32" r="5" fill="#f5c842"/>
      </svg>
    </div>
    <h1>Daisy's <em>Road to</em> Anthropic</h1>
    <p class="hero-sub">Software Engineer — Account Abuse &amp; Trust &amp; Safety</p>
    <p class="hero-tagline">"Every flower blooms in its own time. Every skill builds toward something greater."</p>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Tasks done</div><div class="stat-val" id="stat-done">0</div></div>
    <div class="stat-card"><div class="stat-label">Total tasks</div><div class="stat-val" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Progress</div><div class="stat-val" id="stat-pct">0%</div></div>
    <div class="stat-card"><div class="stat-label">Current phase</div><div class="stat-val" id="stat-phase" style="font-size:14px;margin-top:4px;">—</div></div>
  </div>

  <div class="overall-progress">
    <div class="progress-label">
      <span>Overall growth</span>
      <span id="prog-label-pct">0% in bloom</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="overall-fill" style="width:0%"></div></div>
  </div>

  <div id="phases"></div>

  <footer class="footer">
    <div style="margin-bottom:0.75rem">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <g transform="translate(14,14)">
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0"/>
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0" transform="rotate(60)"/>
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0" transform="rotate(120)"/>
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0" transform="rotate(180)"/>
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0" transform="rotate(240)"/>
          <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#a8c5a0" transform="rotate(300)"/>
        </g>
        <circle cx="14" cy="14" r="4" fill="#f5c842"/>
      </svg>
    </div>
    <p>Tended with care — one petal at a time.</p>
  </footer>
</div>

<script>
const TASK_DETAILS = {
  s1: {
    desc: "Pandas and NumPy are your bread and butter for data analysis. Every abuse detection system starts with data wrangling.",
    steps: [
      { id: 'st-s1-1', text: 'Install Python environment with Anaconda or pyenv', hint: 'Use pyenv if you want clean version management' },
      { id: 'st-s1-2', text: 'Complete Kaggle\'s free Pandas course', hint: 'kaggle.com/learn/pandas — takes about 4 hours' },
      { id: 'st-s1-3', text: 'Work through NumPy basics (arrays, slicing, broadcasting)', hint: 'numpy.org/learn has a great quickstart' },
      { id: 'st-s1-4', text: 'Load a real CSV dataset and compute group statistics with groupby()', hint: 'Try the NYC 311 dataset from data.cityofnewyork.us' },
      { id: 'st-s1-5', text: 'Build one complete end-to-end data analysis notebook', hint: 'Question → data load → clean → analyze → visualize → conclusion' },
    ],
    resources: [
      { label: 'Kaggle Pandas course (free)', url: 'https://www.kaggle.com/learn/pandas' },
      { label: 'NYC Open Data portal', url: 'https://opendata.cityofnewyork.us' },
    ]
  },
  s2: {
    desc: "SQL is the language of data. Window functions and CTEs are what separate junior analysts from engineers who can actually diagnose abuse at scale.",
    steps: [
      { id: 'st-s2-1', text: 'Review basic SQL: SELECT, WHERE, GROUP BY, JOIN', hint: 'Skip if you already know these — just a refresher checkpoint' },
      { id: 'st-s2-2', text: 'Learn CTEs (WITH clauses) and practice writing multi-step queries', hint: 'Think of CTEs as named subqueries that make complex logic readable' },
      { id: 'st-s2-3', text: 'Master window functions: ROW_NUMBER, RANK, LAG, LEAD, SUM OVER', hint: 'These are essential for detecting patterns over time in user behavior' },
      { id: 'st-s2-4', text: 'Complete 20 LeetCode SQL problems (medium difficulty)', hint: 'Focus on problems tagged "database" — sort by acceptance rate' },
      { id: 'st-s2-5', text: 'Write a query that detects suspicious behavior in a dataset', hint: 'e.g. users who perform the same action more than 10x in an hour' },
    ],
    resources: [
      { label: 'Mode SQL tutorial', url: 'https://mode.com/sql-tutorial' },
      { label: 'LeetCode SQL problems', url: 'https://leetcode.com/problemset/database' },
    ]
  },
  s3: {
    desc: "Good Git habits signal seniority. Messy commit history and no PRs signal someone who codes alone. Practice like you're on a team from day one.",
    steps: [

const STORAGE_KEY = 'daisy_anthropic_tracker_v2';
let state = { checks: {}, stepChecks: {}, notes: {} };
let openPhases = { p1: true, p2: false, p3: false, p4: false };
let currentPanelId = null;

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function allItems() {
  return PHASES.flatMap(p => [...p.skills, ...p.projects, ...p.nyc]);
}

function getStepsDone(taskId) {
  const detail = TASK_DETAILS[taskId];
  if (!detail) return { done: 0, total: 0 };
  const total = detail.steps.length;
  const done = detail.steps.filter(s => state.stepChecks[s.id]).length;
  return { done, total };
}

function updateStats() {
  const total = allItems().length;
  const done = allItems().filter(i => state.checks[i.id]).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('prog-label-pct').textContent = pct + '% in bloom';

  let phaseLabel = 'Sprouting';
  PHASES.forEach(p => {
    const items = [...p.skills, ...p.projects, ...p.nyc];
    const pdone = items.filter(i => state.checks[i.id]).length;
    if (pdone / items.length >= 0.5) phaseLabel = p.label;
  });
  document.getElementById('stat-phase').textContent = phaseLabel;

  PHASES.forEach(p => {
    const items = [...p.skills, ...p.projects, ...p.nyc];
    const pdone = items.filter(i => state.checks[i.id]).length;
    const ppct = items.length > 0 ? Math.round(pdone / items.length * 100) : 0;
    const fill = document.getElementById('fill-' + p.id);
    const count = document.getElementById('count-' + p.id);
    if (fill) fill.style.width = ppct + '%';
    if (count) count.textContent = pdone + '/' + items.length;
  });
}

function section(items, label, phaseColor) {
  return `
    <div class="section-head"><span>${label}</span></div>
    ${items.map(item => {
      const { done, total } = getStepsDone(item.id);
      const hasSteps = total > 0;
      return `
        <div class="check-item">
          <input type="checkbox" id="cb-${item.id}" data-id="${item.id}" ${state.checks[item.id] ? 'checked' : ''} onchange="toggleMain('${item.id}')">
          <div class="check-text" onclick="openPanel('${item.id}')">
            <div class="check-main ${state.checks[item.id] ? 'done' : ''}" id="lbl-${item.id}">${item.text}</div>
            <div class="check-sub">${item.sub}</div>
            ${hasSteps ? `
              <div class="task-progress">
                <div class="task-prog-bar"><div class="task-prog-fill" id="tpf-${item.id}" style="width:${total>0?Math.round(done/total*100):0}%;background:${phaseColor}"></div></div>
                <span class="task-prog-label" id="tpl-${item.id}">${done}/${total} steps</span>
              </div>` : ''}
          </div>
          <button class="open-panel-btn" onclick="openPanel('${item.id}')">Guide →</button>
        </div>
      `;
    }).join('')}
  `;
}

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = PHASES.map((p, i) => {
    const items = [...p.skills, ...p.projects, ...p.nyc];
    const done = items.filter(i => state.checks[i.id]).length;
    const pct = items.length > 0 ? Math.round(done / items.length * 100) : 0;
    const isOpen = openPhases[p.id];
    return `
      <div class="phase-card" style="animation-delay:${0.1+i*0.08}s">
        <div class="phase-header" onclick="togglePhase('${p.id}')">
          <div class="phase-icon" style="background:${p.color}22;">${p.icon}</div>
          <div class="phase-meta">
            <div class="phase-badge" style="color:${p.color}">${p.label}</div>
            <div class="phase-title">${p.title}</div>
          </div>
          <div class="phase-right">
            <span class="phase-count" id="count-${p.id}">${done}/${items.length}</span>
            <div class="phase-mini-bar"><div class="phase-mini-fill" id="fill-${p.id}" style="width:${pct}%;background:${p.barColor}"></div></div>
            <span class="chevron" id="chev-${p.id}" style="transform:rotate(${isOpen?'180deg':'0deg'})">▾</span>
          </div>
        </div>
        <div class="phase-body ${isOpen?'open':''}" id="body-${p.id}">
          ${section(p.skills, 'Skills to build', p.color)}
          ${section(p.projects, 'Personal projects', p.color)}
          ${section(p.nyc, 'NYC opportunities', p.color)}
          <div class="notes-wrap">
            <div class="notes-label">Notes &amp; reflections</div>
            <textarea class="notes" id="notes-${p.id}" placeholder="Jot down links, progress, ideas...">${state.notes[p.id]||''}</textarea>
            <div class="notes-footer">
              <button class="save-btn" onclick="saveNotes('${p.id}')">Save notes</button>
              <span class="saved-hint" id="hint-${p.id}">✓ Saved</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  updateStats();
}

function toggleMain(id) {
  state.checks[id] = !state.checks[id];
  const cb = document.getElementById('cb-' + id);
  const lbl = document.getElementById('lbl-' + id);
  if (cb) cb.checked = state.checks[id];
  if (lbl) lbl.className = 'check-main' + (state.checks[id] ? ' done' : '');
  updateStats();
  saveState();
  if (currentPanelId === id) updatePanelProgress(id);
}

function toggleStep(stepId, taskId) {
  state.stepChecks[stepId] = !state.stepChecks[stepId];
  const cb = document.getElementById('scb-' + stepId);
  const lbl = document.getElementById('slbl-' + stepId);
  if (cb) cb.checked = state.stepChecks[stepId];
  if (lbl) lbl.className = 'step-main' + (state.stepChecks[stepId] ? ' done' : '');
  saveState();
  updatePanelProgress(taskId);
  updateTaskMiniProgress(taskId);
}

function updatePanelProgress(taskId) {
  const { done, total } = getStepsDone(taskId);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('panel-prog-fill');
  const label = document.getElementById('panel-prog-label');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = done + ' / ' + total + ' steps';
}

function updateTaskMiniProgress(taskId) {
  const { done, total } = getStepsDone(taskId);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('tpf-' + taskId);
  const label = document.getElementById('tpl-' + taskId);
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = done + '/' + total + ' steps';
}

function findPhaseForTask(taskId) {
  for (const p of PHASES) {
    const all = [...p.skills, ...p.projects, ...p.nyc];
    if (all.find(i => i.id === taskId)) return p;
  }
  return null;
}

function findTaskById(taskId) {
  for (const p of PHASES) {
    const all = [...p.skills, ...p.projects, ...p.nyc];
    const item = all.find(i => i.id === taskId);
    if (item) return item;
  }
  return null;
}

function openPanel(taskId) {
  const detail = TASK_DETAILS[taskId];
  if (!detail) return;
  const task = findTaskById(taskId);
  const phase = findPhaseForTask(taskId);
  if (!task || !phase) return;

  currentPanelId = taskId;

  document.getElementById('panel-phase-badge').textContent = phase.label;
  document.getElementById('panel-phase-badge').style.color = phase.color;
  document.getElementById('panel-title').textContent = task.text;
  document.getElementById('panel-desc').textContent = detail.desc;

  const { done, total } = getStepsDone(taskId);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('panel-prog-fill').style.width = pct + '%';
  document.getElementById('panel-prog-label').textContent = done + ' / ' + total + ' steps';

  let html = '';
  html += '<p class="panel-section-label">Steps to complete</p>';
  detail.steps.forEach(step => {
    html += `
      <div class="step-item">
        <input type="checkbox" id="scb-${step.id}" ${state.stepChecks[step.id]?'checked':''} onchange="toggleStep('${step.id}','${taskId}')">
        <div class="step-text">
          <div class="step-main ${state.stepChecks[step.id]?'done':''}" id="slbl-${step.id}">${step.text}</div>
          ${step.hint ? `<div class="step-hint">${step.hint}</div>` : ''}
        </div>
      </div>
    `;
  });

  if (detail.resources && detail.resources.length) {
    html += '<p class="panel-section-label">Resources</p>';
    detail.resources.forEach(r => {
      html += `<a class="panel-resource" href="${r.url}" target="_blank"><span>↗</span>${r.label}</a>`;
    });
  }

  html += `
    <div class="panel-main-check" onclick="toggleMain('${taskId}')">
      <input type="checkbox" id="panel-main-cb" ${state.checks[taskId]?'checked':''} onchange="toggleMain('${taskId}')">
      <span class="panel-main-check-label">Mark task as complete</span>
    </div>
  `;

  document.getElementById('panel-body').innerHTML = html;

  document.getElementById('overlay').classList.add('active');
  document.getElementById('side-panel').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('side-panel').classList.remove('active');
  document.body.style.overflow = '';
  currentPanelId = null;
}

function togglePhase(id) {
  openPhases[id] = !openPhases[id];
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  if (body) body.className = 'phase-body ' + (openPhases[id] ? 'open' : '');
  if (chev) chev.style.transform = openPhases[id] ? 'rotate(180deg)' : 'rotate(0deg)';
}

function saveNotes(id) {
  const ta = document.getElementById('notes-' + id);
  if (ta) state.notes[id] = ta.value;
  saveState();
  const hint = document.getElementById('hint-' + id);
  if (hint) { hint.style.opacity = '1'; setTimeout(() => hint.style.opacity = '0', 2000); }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

loadState();
render();
</script>
